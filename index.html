<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>LC79</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        :root {
            --primary-glow: #00ff00;
            --secondary-glow: #00ccff;
            --bg-color: #0c1a2a;
            --panel-bg: #001a33;
        }

        body { background: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; margin: 0; padding: 10px; }
        .wrapper { max-width: 450px; margin: auto; background: var(--panel-bg); padding: 15px; border-radius: 20px; border: 1px solid #003366; box-shadow: 0 0 30px rgba(0, 255, 0, 0.15); }
        
        h2 { text-align: center; color: var(--secondary-glow); margin: 10px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        .circle {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid #00aaff;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: 900;
            margin: 20px auto;
            background-color: #000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .glow-effect { animation: blink-glow 1.2s ease-in-out; }
        @keyframes blink-glow {
            0% { box-shadow: 0 0 0px var(--primary-glow); border-color: #00aaff; transform: scale(1); }
            50% { box-shadow: 0 0 40px var(--primary-glow); border-color: var(--primary-glow); transform: scale(1.15); }
            100% { box-shadow: 0 0 0px var(--primary-glow); border-color: #00aaff; transform: scale(1); }
        }

        .status-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #003366; }
        .status { text-align: center; color: #66ccff; font-size: 13px; font-weight: bold; }
        .confidence { text-align: center; font-size: 16px; color: #ffcc00; margin: 5px 0; font-weight: bold; }
        .time { text-align: center; font-size: 14px; color: #888; margin-bottom: 5px; }

        .ai-log { font-family: 'Courier New', Courier, monospace; font-size: 11px; text-align: center; color: #00ff00; height: 20px; overflow: hidden; }

        table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #003366; }
        th { background: #003f66; color: #00ccff; text-transform: uppercase; font-size: 11px; }

        .win { color: #00ff00; font-weight: bold; }
        .lose { color: #ff3333; font-weight: bold; }
        .stats-bar { display: flex; justify-content: space-around; padding: 10px; background: #002244; border-radius: 8px; margin-top: 10px; font-weight: bold; color: #00ffcc; font-size: 13px; }
        
        .anomaly-warning { color: #ff3333; font-size: 10px; text-align: center; margin-top: 5px; animation: pulse 1s infinite; display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>LC79 AI</h2>

    <div class="status-box">
        <div id="phienText" class="status">Đang đồng bộ phiên...</div>
        <div class="circle" id="prediction">--</div>
        <div id="confidence-display" class="confidence">Tin cậy: 0%</div>
        <div id="ai-analysis" class="ai-log">Hệ thống đang khởi động...</div>
        <div id="warning-ui" class="anomaly-warning">CẢNH BÁO: NHÀ CÁI ĐANG THAY ĐỔI THUẬT TOÁN</div>
    </div>

    <div class="time" id="clock">00:00:00</div>
    
    <div id="pattern-display" style="text-align:center; font-size:11px; color:#5588aa; margin-bottom: 10px;">Chuỗi gần đây: ---</div>

    <div class="stats-bar" id="stats">
        <span>W: 0</span> | <span>L: 0</span> | <span>%: 0%</span>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th>Phiên</th>
                <th>Dự đoán</th>
                <th>Kết quả</th>
                <th>Trạng thái</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
    
    <div style="text-align: center; margin-top: 10px; font-size: 9px; color: #445566;">
        ENGINE: UltraDice VIP v4.0 (Anti-Cheat Enabled)
    </div>
</div>

<script>
// ==========================================
// 1. SUPREME ENGINE LOGIC
// ==========================================
class SupremePredictionEngine {
    constructor() {
        this.history = [];
        this.weights = {};
        this.lastPredictions = {};
        this.marketType = "Ổn định";
        this.anomalyScore = 0;

        // Khởi tạo 15 model dự đoán (từ 1-1 đến bệt và logic ẩn)
        for (let i = 1; i <= 15; i++) {
            this.weights["m" + i] = 1.0;
        }
    }

    addResult(r) {
        let v = (r === "TAI" || r === "T") ? "T" : "X";
        this.history.push(v);
        if (this.history.length > 150) this.history.shift();

        this.detectAnomalies();
        this.learn(v);
    }

    detectAnomalies() {
        if (this.history.length < 10) return;
        let last8 = this.history.slice(-8).join("");
        
        // Phát hiện chuỗi bất thường (nhà cái can thiệp)
        let isRigged = /T{7,}|X{7,}/.test(last8) || /TXTXTX/.test(last8);
        if (isRigged) {
            this.anomalyScore = Math.min(100, this.anomalyScore + 25);
        } else {
            this.anomalyScore = Math.max(0, this.anomalyScore - 10);
        }
    }

    learn(real) {
        for (let m in this.lastPredictions) {
            if (this.lastPredictions[m] === real) {
                this.weights[m] += 0.12; 
            } else {
                this.weights[m] -= 0.18;
            }
            this.weights[m] = Math.max(0.1, Math.min(3.5, this.weights[m]));
        }
        this.lastPredictions = {};
    }

    getPrediction() {
        if (this.history.length < 5) return null;

        let vote = { T: 0, X: 0 };
        const models = [
            () => this.m_11(),      // m1: 1-1
            () => this.m_22(),      // m2: 2-2
            () => this.m_321(),     // m3: 3-2-1
            () => this.m_bet(),     // m4: Bệt
            () => this.m_mirror(),  // m5: Đối xứng
            () => this.m_climb(),   // m6: Cầu nghiêng
            () => this.m_33(),      // m7: 3-3
            () => this.m_21(),      // m8: 2-1
            () => this.m_anti(),    // m9: Bẻ cầu
            () => ({ p: this.history.at(-1), c: 0.6 }), // m10: Theo đuôi
            () => ({ p: this.history.at(-1) === 'T' ? 'X' : 'T', c: 0.6 }), // m11: Nghịch đảo
            () => this.m_logicX(),  // m12: Logic ẩn 1
            () => this.m_logicY(),  // m13: Logic ẩn 2
            () => this.m_stable(),  // m14: Cân bằng
            () => ({ p: Math.random() > 0.5 ? 'T' : 'X', c: 0.4 }) // m15: Random ngẫu nhiên
        ];

        models.forEach((fn, i) => {
            let res = fn();
            if (res) {
                let mId = "m" + (i + 1);
                vote[res.p] += res.c * this.weights[mId];
                this.lastPredictions[mId] = res.p;
            }
        });

        let result = vote.T > vote.X ? 'T' : 'X';
        let total = vote.T + vote.X;
        return {
            side: result,
            conf: Math.min(0.97, (Math.max(vote.T, vote.X) / total)),
            market: this.anomalyScore > 60 ? "PHÁT HIỆN BẺ CẦU" : "CẦU ĐANG CHẠY"
        };
    }

    // --- LOGIC NHẬN DIỆN CHI TIẾT ---
    m_11() { 
        let s = this.history.slice(-3).join("");
        if (s === "TXT" || s === "XTX") return { p: s[2] === 'T' ? 'X' : 'T', c: 0.9 };
    }
    m_22() {
        let s = this.history.slice(-4).join("");
        if (s === "TTXX" || s === "XXTT") return { p: s[3], c: 0.85 };
    }
    m_321() {
        let s = this.history.slice(-5).join("");
        if (s === "TTTXX") return { p: 'X', c: 0.95 };
        if (s === "XXXXT") return { p: 'T', c: 0.95 };
    }
    m_bet() {
        let last3 = this.history.slice(-3).join("");
        if (last3 === "TTT" || last3 === "XXX") return { p: last3[0], c: 0.8 };
    }
    m_mirror() {
        let h = this.history;
        if (h[h.length-1] === h[h.length-4] && h[h.length-2] === h[h.length-3]) return { p: h[h.length-1] === 'T' ? 'X' : 'T', c: 0.7 };
    }
    m_climb() {
        let last10 = this.history.slice(-10);
        let t = last10.filter(x => x === 'T').length;
        if (t >= 7) return { p: 'T', c: 0.75 };
        if (t <= 3) return { p: 'X', c: 0.75 };
    }
    m_33() {
        let s = this.history.slice(-5).join("");
        if (s === "TTTXX") return { p: 'X', c: 0.7 };
    }
    m_21() {
        let s = this.history.slice(-3).join("");
        if (s === "TTX" || s === "XXT") return { p: s[2] === 'T' ? 'X' : 'T', c: 0.65 };
    }
    m_anti() {
        if (this.anomalyScore > 50) return { p: this.history.at(-1) === 'T' ? 'X' : 'T', c: 0.9 };
    }
    m_logicX() {
        let s = this.history.slice(-4).join("");
        if (s === "TXXT") return { p: 'T', c: 0.6 };
    }
    m_logicY() {
        let s = this.history.slice(-4).join("");
        if (s === "XTTX") return { p: 'X', c: 0.6 };
    }
    m_stable() {
        return { p: this.history.filter(x => x === 'T').length > this.history.length / 2 ? 'X' : 'T', c: 0.55 };
    }
}

// ==========================================
// 2. APP UI & CONTROLLER
// ==========================================
const apiURL = "https://wtx.tele68.com/v1/tx/lite-sessions?cp=R&cl=R&pf=web&at=ac66e2c04bff27faef086d365f9b6897";
const ai = new SupremePredictionEngine();

let lastSessionId = 0;
let predictions = {};
let stats = { win: 0, lose: 0 };

async function refresh() {
    try {
        const response = await fetch(apiURL);
        const data = await response.json();
        const list = data.list;
        if (!list || list.length === 0) return;

        const latest = list[0];
        const nextId = latest.id + 1;

        document.getElementById("phienText").innerText = "PHIÊN: " + nextId;
        document.getElementById("clock").innerText = new Date().toLocaleTimeString();

        // Kiểm tra kết quả mới
        if (latest.id !== lastSessionId) {
            ai.addResult(latest.resultTruyenThong);
            
            if (predictions[latest.id]) {
                const isWin = predictions[latest.id] === (latest.resultTruyenThong.startsWith('T') ? 'T' : 'X');
                updateStats(latest.id, predictions[latest.id], latest.resultTruyenThong, isWin);
            }

            lastSessionId = latest.id;

            // Thực hiện dự đoán mới cho phiên tiếp theo
            const analysis = ai.getPrediction();
            if (analysis) {
                predictions[nextId] = analysis.side;
                renderUI(analysis);
            }

            document.getElementById("pattern-display").innerText = "Chuỗi: " + ai.history.slice(-12).join("");
            document.getElementById("warning-ui").style.display = ai.anomalyScore > 60 ? "block" : "none";
        }
    } catch (err) {
        console.error("API Error");
    }
}

function renderUI(data) {
    const pEl = document.getElementById("prediction");
    pEl.innerText = data.side === 'T' ? "TÀI" : "XỈU";
    pEl.style.color = data.side === 'T' ? "#ff3333" : "#ffffff";
    pEl.style.borderColor = data.side === 'T' ? "#ff3333" : "#00aaff";

    document.getElementById("confidence-display").innerText = `Tin cậy: ${Math.round(data.conf * 100)}%`;
    document.getElementById("ai-analysis").innerText = "AI: " + data.market;

    pEl.classList.remove("glow-effect");
    void pEl.offsetWidth; 
    pEl.classList.add("glow-effect");
}

function updateStats(id, pred, realRaw, isWin) {
    const real = realRaw.startsWith('T') ? 'T' : 'X';
    if (isWin) stats.win++; else stats.lose++;
    
    const total = stats.win + stats.lose;
    const rate = ((stats.win / total) * 100).toFixed(1);
    document.getElementById("stats").innerHTML = `<span>W: ${stats.win}</span> | <span>L: ${stats.lose}</span> | <span>%: ${rate}%</span>`;

    const row = document.createElement("tr");
    row.innerHTML = `
        <td>#${id}</td>
        <td>${pred === 'T' ? 'Tài' : 'Xỉu'}</td>
        <td>${real}</td>
        <td class="${isWin ? 'win' : 'lose'}">${isWin ? 'THẮNG' : 'THUA'}</td>
    `;
    const tbody = document.getElementById("history");
    tbody.prepend(row);
    if (tbody.rows.length > 8) tbody.deleteRow(8);
}

// Chạy vòng lặp 3 giây 1 lần
setInterval(refresh, 3000);
refresh();

</script>
</body>
</html>
